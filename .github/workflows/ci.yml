name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/external-execution-protocol/typescript/package-lock.json
      - name: Install
        run: |
          python -m pip install -e ".[dev]"
          npm ci --prefix packages/external-execution-protocol/typescript
      - name: Static checks
        run: |
          python -m ruff format --check .
          python -m ruff check .
          python scripts/check_secrets.py
      - name: Protocol tests
        run: |
          python -m pytest
          npm test --prefix packages/external-execution-protocol/typescript
